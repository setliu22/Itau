run_name: conv1d_stacked_cross_attention

data:
  train_pkl: data/splits/train.pkl
  val_pkl: data/splits/val.pkl
  test_pkl: data/splits/test.pkl

rendering:
  height: 32
  background: black

slicing:
  slice_width: 6
  stride: 6
  remove_padding: false
  pad_to_width: null

model:
  encoder_type: transformer
  embed_dim: 128
  pooling: attention
  pair_head: stacked_cross_attention
  cross_attention_layers: 4
  cross_attention_heads: 4
  cross_attention_feedforward: 256
  dropout: 0.0

training:
  num_epochs: 20
  batch_size: 64
  lr: 1.0e-3
  num_workers: 4
  seed: 7
